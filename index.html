<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gradebook App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Gradebook App</h1>

    <label>Enter Class Scores (comma separated)</label>
    <input type="text" id="classScores" placeholder="92, 88, 77, 100">

    <label>Enter Your Score</label>
    <input type="number" id="studentScore" placeholder="Enter your score">

    <button id="calculateBtn">Calculate Result</button>

    <div id="result" class="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
